<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Arquivos - SCONT</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* ===== RESET E VARIÁVEIS ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --primary-dark: #1e40af;
            --secondary: #0f766e;
            --success: #059669;
            --warning: #d97706;
            --danger: #dc2626;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --radius: 8px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--gray-800);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* ===== HEADER ===== */
        .header {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            padding: 32px;
            margin-bottom: 32px;
            border-left: 4px solid var(--primary);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-logo {
            max-width: 120px;
            height: auto;
        }

        .header-title {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .header-title h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--gray-900);
        }

        .header-title p {
            font-size: 12px;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--gray-50);
            border-radius: var(--radius);
            font-size: 12px;
            color: var(--gray-600);
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--gray-400);
            animation: pulse 2s infinite;
        }

        .status-indicator.connected {
            background: var(--success);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ===== BOTÕES ===== */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: var(--gray-200);
            color: var(--gray-800);
        }

        .btn-secondary:hover {
            background: var(--gray-300);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            padding: 6px 12px;
            font-size: 11px;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .btn-success {
            background: var(--success);
            color: white;
            padding: 6px 12px;
            font-size: 11px;
        }

        .btn-success:hover {
            background: #047857;
        }

        .btn-back {
            background: var(--primary-light);
            color: white;
            margin-bottom: 16px;
        }

        .btn-back:hover {
            background: var(--primary-dark);
        }

        /* ===== ALERTS ===== */
        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            display: none;
            border-left: 4px solid;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border-color: var(--success);
        }

        .alert-error {
            background: #fee2e2;
            color: #7f1d1d;
            border-color: var(--danger);
        }

        .alert-info {
            background: #dbeafe;
            color: #0c2d6b;
            border-color: var(--primary-light);
        }

        /* ===== STATS ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            border-left: 4px solid rgba(255, 255, 255, 0.3);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 11px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        /* ===== CONTENT ===== */
        .content {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            padding: 32px;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--gray-200);
            flex-wrap: wrap;
            gap: 16px;
        }

        .content-header h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--gray-900);
        }

        /* ===== BREADCRUMB ===== */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--gray-50) 0%, var(--gray-100) 100%);
            border-radius: 6px;
            border: 1px solid var(--gray-200);
            flex-wrap: wrap;
            font-size: 13px;
            overflow-x: auto;
        }

        .breadcrumb-item {
            color: var(--primary-light);
            cursor: pointer;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
            transition: var(--transition);
            white-space: nowrap;
        }

        .breadcrumb-item:hover {
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary-dark);
        }

        .breadcrumb-separator {
            color: var(--gray-400);
            font-weight: 300;
        }

        /* ===== ITEMS LIST ===== */
        .items-list {
            display: grid;
            gap: 12px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: 6px;
            transition: var(--transition);
        }

        .item:hover {
            border-color: var(--primary-light);
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.02) 0%, rgba(59, 130, 246, 0.05) 100%);
            box-shadow: var(--shadow-sm);
        }

        .item-folder {
            cursor: pointer;
        }

        .item-folder:hover {
            transform: translateX(4px);
        }

        .item-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 16px;
            min-width: 0;
        }

        .item-icon {
            font-size: 28px;
            min-width: 40px;
            text-align: center;
        }

        .item-details {
            flex: 1;
            min-width: 0;
        }

        .item-name {
            color: var(--gray-900);
            font-weight: 600;
            margin-bottom: 4px;
            word-break: break-word;
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
        }

        .item-name:hover {
            color: var(--primary-light);
        }

        .item-meta {
            color: var(--gray-500);
            font-size: 12px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .item-actions {
            display: flex;
            gap: 8px;
            margin-left: 16px;
            flex-wrap: wrap;
        }

        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-500);
        }

        .spinner {
            border: 4px solid var(--gray-200);
            border-top: 4px solid var(--primary-light);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--gray-500);
        }

        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 15px;
            margin-bottom: 10px;
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 32px;
            border-radius: var(--radius);
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--gray-400);
            transition: var(--transition);
        }

        .modal-close:hover {
            color: var(--gray-900);
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 20px;
            word-break: break-word;
        }

        .preview-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--gray-200);
        }

        .preview-text {
            background: var(--gray-50);
            padding: 16px;
            border-radius: 6px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-word;
            margin-bottom: 20px;
            border: 1px solid var(--gray-200);
            line-height: 1.5;
        }

        .upload-area {
            border: 2px dashed var(--primary-light);
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: var(--gray-50);
        }

        .upload-area:hover {
            border-color: var(--primary-dark);
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.02) 0%, rgba(59, 130, 246, 0.05) 100%);
        }

        .upload-area.dragover {
            border-color: var(--primary-dark);
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(59, 130, 246, 0.15) 100%);
        }

        .upload-area p {
            color: var(--gray-600);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .upload-area small {
            color: var(--gray-500);
            font-size: 12px;
        }

        #fileInput {
            display: none;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .header {
                padding: 20px;
            }

            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }

            .content {
                padding: 20px;
            }

            .item {
                flex-direction: column;
                align-items: flex-start;
            }

            .item-actions {
                margin-left: 0;
                margin-top: 12px;
                width: 100%;
            }

            .item-actions button {
                flex: 1;
            }

            .breadcrumb {
                font-size: 12px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                max-width: 95%;
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <div class="header-brand">
                    <img src="https://scontdf.com.br/wp-content/uploads/2019/11/logo-scont-1024x363.png" alt="Logo SCONT" class="header-logo">
                    <div class="header-title">
                        <h1>Gerenciador de Arquivos</h1>
                        <p>Sistema de Armazenamento e Organização</p>
                    </div>
                </div>
                <div class="header-status">
                    <div class="status-indicator" id="statusIndicator"></div>
                    <span id="statusText">Desconectado</span>
                </div>
            </div>
        </div>

        <!-- Alert -->
        <div id="alert" class="alert"></div>

        <!-- Stats -->
        <div class="stats-grid" id="stats" style="display: none;">
            <div class="stat-card">
                <div class="stat-value" id="totalItems">0</div>
                <div class="stat-label">Itens Totais</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalSize">0 MB</div>
                <div class="stat-label">Tamanho Total</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="currentPath">-</div>
                <div class="stat-label">Pasta Atual</div>
            </div>
        </div>

        <!-- Content -->
        <div class="content">
            <div class="content-header">
                <h2>📂 Navegador de Arquivos</h2>
            </div>

            <!-- Breadcrumb -->
            <div class="breadcrumb" id="breadcrumb">
                <span class="breadcrumb-item" onclick="app.navigateTo('')">📁 Raiz</span>
            </div>

            
                <input type="file" id="fileInput" onchange="app.handleFileUpload(event)">
            </div>

            <!-- Items -->
            <div id="itemsContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">📁</div>
                    <p>Carregando...</p>
                </div>
            </div>
	
   
            <!-- Upload Area -->
            <div id="uploadSection" style="display: none; margin-bottom: 24px;">
                <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                    <p>📤 Clique ou arraste arquivos aqui para fazer upload</p>
                    <small>Formatos aceitos: PDF, JPG, PNG, DOC, DOCX, XLS, XLSX (máx. 50MB)</small>
                </div>
<!-- Botão Voltar -->
            <button class="btn btn-back" id="backBtn" onclick="app.goBack()" style="display: none;">
                ← Voltar
            </button>
</div>
     
    </div>

    <!-- Preview Modal -->
    <div id="previewModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="app.closePreview()">✕</button>
            <h3 class="modal-title" id="previewTitle"></h3>
            <div id="previewContent"></div>
            <div style="display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap;">
                <button class="btn btn-primary" onclick="app.downloadFile()">📥 Baixar</button>
                <button class="btn btn-danger" onclick="app.deleteFile()">🗑️ Deletar</button>
                <button class="btn btn-secondary" onclick="app.closePreview()">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIGURAÇÃO SUPABASE =====
        const SUPABASE_CONFIG = {
            URL: 'https://graxaoomeffhsazuzkvg.supabase.co',
            KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdyYXhhb29tZWZmaHNhenV6a3ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTUxMDUsImV4cCI6MjA5MDI5MTEwNX0.ZpbVoNVS4momTyf7NME4mcYuI4oCQUvNFSDbORCHktI', // ← COLOQUE SUA CHAVE AQUI
            BUCKET: 'documentos'
        };

        // ===== APLICAÇÃO PRINCIPAL =====
        const app = {
            // Estado
            state: {
                supabaseClient: null,
                allItems: [],
                currentPath: '',
                pathHistory: [],
                currentPreviewFile: null,
                isConnected: false,
                isLoading: false,
            },

            // ===== INICIALIZAÇÃO =====
            init() {
                console.log('🚀 Inicializando aplicação...');
                this.setupEventListeners();
                this.connect();
            },

            setupEventListeners() {
                const uploadArea = document.getElementById('uploadArea');
                if (uploadArea) {
                    uploadArea.addEventListener('dragover', (e) => {
                        e.preventDefault();
                        uploadArea.classList.add('dragover');
                    });

                    uploadArea.addEventListener('dragleave', () => {
                        uploadArea.classList.remove('dragover');
                    });

                    uploadArea.addEventListener('drop', (e) => {
                        e.preventDefault();
                        uploadArea.classList.remove('dragover');
                        if (e.dataTransfer.files.length > 0) {
                            this.uploadFileToPath(e.dataTransfer.files[0]);
                        }
                    });
                }
            },

            // ===== CONEXÃO =====
            async connect() {
                try {
                    this.setLoading(true);
                    this.showAlert('Conectando ao Supabase...', 'info');

                    // ✅ Reutilizar instância existente
                    if (!this.state.supabaseClient) {
                        this.state.supabaseClient = window.supabase.createClient(
                            SUPABASE_CONFIG.URL,
                            SUPABASE_CONFIG.KEY
                        );
                    }

                    // ✅ Listar recursivamente
                    this.state.allItems = await this.listFilesRecursively('');
                    this.state.currentPath = '';
                    this.state.pathHistory = [];
                    this.state.isConnected = true;

                    this.updateStatus(true);
                    this.showAlert(`✅ Conectado! ${this.state.allItems.length} itens encontrados`, 'success');
                    this.render();

                } catch (error) {
                    this.state.isConnected = false;
                    this.updateStatus(false);
                    this.showAlert(`❌ Erro: ${error.message}`, 'error');
                    console.error('Erro de conexão:', error);
                } finally {
                    this.setLoading(false);
                }
            },

            disconnect() {
                this.state.supabaseClient = null;
                this.state.allItems = [];
                this.state.currentPath = '';
                this.state.isConnected = false;
                this.updateStatus(false);
                this.showAlert('Desconectado do Supabase', 'info');
                this.render();
            },

            updateStatus(connected) {
                const indicator = document.getElementById('statusIndicator');
                const text = document.getElementById('statusText');
                
                if (connected) {
                    indicator.classList.add('connected');
                    text.textContent = 'Conectado';
                } else {
                    indicator.classList.remove('connected');
                    text.textContent = 'Desconectado';
                }
            },

       
            // ===== LISTAR ARQUIVOS RECURSIVAMENTE (CORRIGIDO) =====
async listFilesRecursively(path = '') {
    try {
        const allItems = [];
        const queue = [path];
        const processedFolders = new Set();

        while (queue.length > 0) {
            const currentPath = queue.shift();
            
            // Evitar processar a mesma pasta duas vezes
            if (processedFolders.has(currentPath)) continue;
            processedFolders.add(currentPath);
            
            console.log(`📂 Listando: ${currentPath || 'raiz'}`);

            const { data, error } = await this.state.supabaseClient.storage
                .from(SUPABASE_CONFIG.BUCKET)
                .list(currentPath, { limit: 10000 });

            if (error) {
                console.error(`❌ Erro ao listar ${currentPath}:`, error);
                continue;
            }

            if (!data) continue;

            data.forEach(item => {
                const fullPath = currentPath ? `${currentPath}/${item.name}` : item.name;
                
                // ✅ CORRIGIDO: Adicionar apenas arquivos (id !== null)
                if (item.id !== null) {
                    allItems.push({
                        name: fullPath,
                        metadata: item.metadata,
                        updated_at: item.updated_at,
                        id: item.id
                    });
                } else {
                    // Se é uma pasta (id === null), adicionar à fila para processar depois
                    queue.push(fullPath);
                }
            });
        }

        console.log(`✅ Total de itens encontrados: ${allItems.length}`);
        return allItems;

    } catch (error) {
        console.error('❌ Erro ao listar recursivamente:', error);
        throw error;
    }
},
            // ===== RENDERIZAÇÃO =====
            render() {
                if (!this.state.isConnected) {
                    this.renderEmpty('Desconectado');
                    document.getElementById('stats').style.display = 'none';
                    document.getElementById('uploadSection').style.display = 'none';
                    return;
                }

                document.getElementById('uploadSection').style.display = 'block';
                this.renderItems();
                this.updateStats();
            },

            renderItems() {
                const container = document.getElementById('itemsContainer');
                const backBtn = document.getElementById('backBtn');

                const folders = new Set();
                const files = [];

                this.state.allItems.forEach(item => {
                    const fullName = item.name;
                    
                    if (!this.state.currentPath) {
                        const parts = fullName.split('/');
                        if (parts.length === 1) {
                            files.push({
                                name: fullName,
                                fullPath: fullName,
                                size: item.metadata?.size || 0,
                                updated: item.updated_at
                            });
                        } else if (parts.length > 1) {
                            folders.add(parts[0]);
                        }
                    } else {
                        if (fullName.startsWith(this.state.currentPath + '/')) {
                            const afterPath = fullName.substring(this.state.currentPath.length + 1);
                            const parts = afterPath.split('/');
                            
                            if (parts.length === 1 && parts[0]) {
                                files.push({
                                    name: parts[0],
                                    fullPath: fullName,
                                    size: item.metadata?.size || 0,
                                    updated: item.updated_at
                                });
                            } else if (parts.length > 1) {
                                folders.add(parts[0]);
                            }
                        }
                    }
                });

                if (folders.size === 0 && files.length === 0) {
                    this.renderEmpty('Nenhum item encontrado nesta pasta');
                    backBtn.style.display = this.state.currentPath ? 'block' : 'none';
                    return;
                }

                let html = '<div class="items-list">';

                const sortedFolders = Array.from(folders).sort();
                sortedFolders.forEach(folderName => {
                    const newPath = this.state.currentPath ? this.state.currentPath + '/' + folderName : folderName;
                    const itemsInFolder = this.state.allItems.filter(item => 
                        item.name.startsWith(newPath + '/')
                    ).length;

                    html += `
                        <div class="item item-folder" onclick="app.navigateTo('${newPath}')">
                            <div class="item-info">
                                <div class="item-icon">📁</div>
                                <div class="item-details">
                                    <div class="item-name">${this.escapeHtml(folderName)}</div>
                                    <div class="item-meta">
                                        <span>Pasta</span>
                                        <span>${itemsInFolder} itens</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });

                files.forEach(file => {
                    const icon = this.getFileIcon(file.name);
                    const size = this.formatFileSize(file.size);
                    const date = file.updated ? new Date(file.updated).toLocaleDateString('pt-BR') : 'N/A';

                    html += `
                        <div class="item">
                            <div class="item-info">
                                <div class="item-icon">${icon}</div>
                                <div class="item-details">
                                    <div class="item-name" onclick="app.previewFile('${this.escapeHtml(file.fullPath)}', '${this.escapeHtml(file.name)}')">
                                        ${this.escapeHtml(file.name)}
                                    </div>
                                    <div class="item-meta">
                                        <span>${size}</span>
                                        <span>${date}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="item-actions">
                                <button class="btn btn-success" onclick="event.stopPropagation(); app.previewFile('${this.escapeHtml(file.fullPath)}', '${this.escapeHtml(file.name)}')">👁️ Ver</button>
                                <button class="btn btn-primary" onclick="event.stopPropagation(); app.downloadFileByPath('${this.escapeHtml(file.fullPath)}', '${this.escapeHtml(file.name)}')">📥 Baixar</button>
                                <button class="btn btn-danger" onclick="event.stopPropagation(); app.deleteFileByPath('${this.escapeHtml(file.fullPath)}')">🗑️ Deletar</button>
                            </div>
                        </div>
                    `;
                });

                html += '</div>';
                container.innerHTML = html;

                backBtn.style.display = this.state.currentPath ? 'block' : 'none';
                this.updateBreadcrumb();
            },

            renderEmpty(message) {
                const container = document.getElementById('itemsContainer');
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>${message}</p>
                    </div>
                `;
            },

            updateBreadcrumb() {
                const breadcrumb = document.getElementById('breadcrumb');
                let html = '<span class="breadcrumb-item" onclick="app.navigateTo(\'\')">📁 Raiz</span>';

                if (this.state.currentPath) {
                    const parts = this.state.currentPath.split('/');
                    let accumulated = '';

                    parts.forEach((part, index) => {
                        accumulated += (accumulated ? '/' : '') + part;
                        html += '<span class="breadcrumb-separator">/</span>';
                        html += `<span class="breadcrumb-item" onclick="app.navigateTo('${accumulated}')">${this.escapeHtml(part)}</span>`;
                    });
                }

                breadcrumb.innerHTML = html;
            },

            updateStats() {
                const totalSize = this.state.allItems.reduce((sum, item) => sum + (item.metadata?.size || 0), 0);

                document.getElementById('totalItems').textContent = this.state.allItems.length;
                document.getElementById('totalSize').textContent = this.formatFileSize(totalSize);
                document.getElementById('currentPath').textContent = this.state.currentPath || 'Raiz';
                document.getElementById('stats').style.display = 'grid';
            },

            // ===== NAVEGAÇÃO =====
            navigateTo(path) {
                if (this.state.currentPath) {
                    this.state.pathHistory.push(this.state.currentPath);
                }
                this.state.currentPath = path;
                this.renderItems();
                this.updateStats();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            goBack() {
                if (this.state.pathHistory.length > 0) {
                    this.state.currentPath = this.state.pathHistory.pop();
                } else {
                    this.state.currentPath = '';
                }
                this.renderItems();
                this.updateStats();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            // ===== PREVIEW =====
            async previewFile(filePath, fileName) {
                try {
                    this.state.currentPreviewFile = { filePath, fileName };
                    const modal = document.getElementById('previewModal');
                    const previewContent = document.getElementById('previewContent');
                    const previewTitle = document.getElementById('previewTitle');

                    previewTitle.textContent = fileName;
                    previewContent.innerHTML = '<div class="loading"><div class="spinner"></div><p>Carregando...</p></div>';
                    modal.classList.add('active');

                    const { data, error } = await this.state.supabaseClient.storage
                        .from(SUPABASE_CONFIG.BUCKET)
                        .createSignedUrl(filePath, 3600);

                    if (error) throw error;

                    const url = data.signedUrl;
                    const ext = fileName.split('.').pop().toLowerCase();

                    if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) {
                        previewContent.innerHTML = `<img src="${url}" class="preview-image" alt="${this.escapeHtml(fileName)}">`;
                    } else if (['pdf'].includes(ext)) {
                        previewContent.innerHTML = `
                            <iframe src="${url}" style="width: 100%; height: 500px; border: 1px solid #e5e7eb; border-radius: 8px;"></iframe>
                        `;
                    } else if (['txt', 'json', 'csv', 'xml', 'html', 'css', 'js'].includes(ext)) {
                        const response = await fetch(url);
                        const text = await response.text();
                        previewContent.innerHTML = `<div class="preview-text">${this.escapeHtml(text)}</div>`;
                    } else {
                        previewContent.innerHTML = `
                            <p style="margin-bottom: 16px;">Tipo de arquivo não suportado para visualização</p>
                            <a href="${url}" target="_blank" class="btn btn-primary">Abrir em nova aba</a>
                        `;
                    }
                } catch (error) {
                    document.getElementById('previewContent').innerHTML = `<p style="color: #dc2626;">Erro: ${error.message}</p>`;
                }
            },

            closePreview() {
                document.getElementById('previewModal').classList.remove('active');
                this.state.currentPreviewFile = null;
            },

            // ===== DOWNLOAD =====
            async downloadFileByPath(filePath, fileName) {
                try {
                    const { data, error } = await this.state.supabaseClient.storage
                        .from(SUPABASE_CONFIG.BUCKET)
                        .createSignedUrl(filePath, 3600);

                    if (error) throw error;

                    const a = document.createElement('a');
                    a.href = data.signedUrl;
                    a.download = fileName;
                    a.click();

                    this.showAlert('✅ Download iniciado!', 'success');
                } catch (error) {
                    this.showAlert(`❌ Erro ao baixar: ${error.message}`, 'error');
                }
            },

            async downloadFile() {
                if (!this.state.currentPreviewFile) return;
                await this.downloadFileByPath(this.state.currentPreviewFile.filePath, this.state.currentPreviewFile.fileName);
            },

            // ===== DELETE =====
            async deleteFileByPath(filePath) {
                if (!confirm('Tem certeza que deseja deletar este arquivo?')) return;

                try {
                    const { error } = await this.state.supabaseClient.storage
                        .from(SUPABASE_CONFIG.BUCKET)
                        .remove([filePath]);

                    if (error) throw error;

                    this.showAlert('✅ Arquivo deletado com sucesso!', 'success');
                    this.closePreview();
                    await this.connect();
                } catch (error) {
                    this.showAlert(`❌ Erro ao deletar: ${error.message}`, 'error');
                }
            },

            async deleteFile() {
                if (!this.state.currentPreviewFile) return;
                await this.deleteFileByPath(this.state.currentPreviewFile.filePath);
            },

            // ===== UPLOAD =====
            handleFileUpload(event) {
                const file = event.target.files[0];
                if (file) {
                    this.uploadFileToPath(file);
                }
                event.target.value = '';
            },

            async uploadFileToPath(file) {
                try {
                    if (file.size > 50 * 1024 * 1024) {
                        this.showAlert('Arquivo muito grande! Máximo 50MB.', 'error');
                        return;
                    }

                    const allowedTypes = ['application/pdf', 'image/jpeg', 'image/png', 'application/msword', 
                        'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
                        'application/vnd.ms-excel',
                        'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'];
                    
                    if (!allowedTypes.includes(file.type)) {
                        this.showAlert('Tipo de arquivo não permitido.', 'error');
                        return;
                    }

                    this.setLoading(true);
                    this.showAlert('Enviando arquivo...', 'info');

                    const timestamp = new Date().getTime();
                    const fileName = `${timestamp}_${file.name}`;
                    const filePath = this.state.currentPath 
                        ? `${this.state.currentPath}/${fileName}`
                        : fileName;

                    const { data, error } = await this.state.supabaseClient.storage
                        .from(SUPABASE_CONFIG.BUCKET)
                        .upload(filePath, file);

                    if (error) throw error;

                    this.showAlert('✅ Arquivo enviado com sucesso!', 'success');
                    await this.connect();

                } catch (error) {
                    this.showAlert(`❌ Erro ao enviar: ${error.message}`, 'error');
                } finally {
                    this.setLoading(false);
                }
            },

            // ===== UTILITÁRIOS =====
            getFileIcon(fileName) {
                const ext = fileName.split('.').pop().toLowerCase();
                const icons = {
                    pdf: '📄', doc: '📋', docx: '📋', xls: '📊', xlsx: '📊',
                    ppt: '🎯', pptx: '🎯', jpg: '🖼️', jpeg: '🖼️', png: '🖼️',
                    gif: '🖼️', mp4: '🎬', mp3: '🎵', zip: '📦', rar: '📦',
                    txt: '📝', json: '⚙️', csv: '📈', html: '🌐', css: '🎨', js: '⚡'
                };
                return icons[ext] || '📁';
            },

            formatFileSize(bytes) {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
            },

            showAlert(message, type) {
                const alert = document.getElementById('alert');
                alert.textContent = message;
                alert.className = `alert show alert-${type}`;

                setTimeout(() => {
                    alert.classList.remove('show');
                }, 5000);
            },

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },

            setLoading(loading) {
                this.state.isLoading = loading;
            }
        };

        // ===== INICIAR APLICAÇÃO =====
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
</html>
